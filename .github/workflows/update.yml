name: Update IP Lists (GCP & WeChat)
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

# 核心修正：添加写权限，解决 Exit Code 128
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 升级到 v4，解决 Node.js 警告
      - uses: actions/checkout@v4
      
      # 升级到 v5，解决 Node.js 警告
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install requests
        
      # 1. 运行原有的谷歌云脚本
      - name: Run GCP script
        run: python parse_ips.py
        
      # 2. 运行新增的企业微信脚本（安全注入 Secrets）
      - name: Run WeChat script
        env:
          CORP_ID: ${{ secrets.CORP_ID }}
          CORP_SECRET: ${{ secrets.CORP_SECRET }}
        run: python parse_wechat_ips.py
        
      # 3. 统一暂存并提交变动
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # 同时跟踪两个文本文件的变动
          git add gcp_ranges.txt wechat_ranges.txt
          # 只要其中任意一个文件有变动就会提交；全无变动则优雅退出
          git commit -m "Update IP lists (GCP & WeChat)" || exit 0
          git push
