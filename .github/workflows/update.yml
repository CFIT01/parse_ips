name: Update IP Lists (GCP & WeChat)
on:
  schedule:
    - cron: '0 0 * * *' # 谷歌云依然每天定时跑
  workflow_dispatch: 
  repository_dispatch:
    types: [budibase_wechat_json] # 监听来自 Budibase 的触发事件

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install requests
        
      # 1. 定时触发或手动触发时，才跑原有的谷歌云脚本
      - name: Run GCP script
        if: github.event_name != 'repository_dispatch'
        run: python parse_ips.py
        
      # 2. 接收 Budibase 的 JSON，并统一转化为严格的 CIDR 格式
      - name: Convert Budibase JSON to Strict CIDR TXT
        if: github.event_name == 'repository_dispatch'
        env:
          BUDIBASE_DATA: ${{ toJson(github.event.client_payload.raw_json) }}
        run: |
          python -c "
          import json, os, sys
          
          # 读取 Budibase 传过来的原始数据
          raw_ips = json.loads(os.environ['BUDIBASE_DATA'])
          print(f'收到来自 Budibase 的原始 IP 数量: {len(raw_ips)}')
          
          # 熔断保护
          if len(raw_ips) < 10:
              print('🚨 CRITICAL ERROR: IP 数量异常，拒绝更新！')
              sys.exit(1)
              
          cidr_ips = []
          for ip in raw_ips:
              ip = ip.strip()
              if '*' in ip:
                  # 兼容可能的通配符格式：101.226.103.* -> 101.226.103.0/24
                  cidr_ips.append(ip.replace('*', '0/24'))
              elif '/' in ip:
                  # 已经是 CIDR 格式：保持原样
                  cidr_ips.append(ip)
              else:
                  # 单个独立 IP：统一末尾补齐 /32 变成严格 CIDR
                  cidr_ips.append(f'{ip}/32')
                  
          # 去重并排序
          final_ips = sorted(list(set(cidr_ips)))
          
          # 写入飞塔读取的纯文本
          with open('wechat_ranges.txt', 'w') as f:
              f.write('\n'.join(final_ips))
              
          print(f'✅ 格式已全部统一为标准 CIDR 格式，共 {len(final_ips)} 条记录。')
          "
        
      # 3. 统一提交代码变动
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add gcp_ranges.txt wechat_ranges.txt
          git commit -m "Update IP lists (GCP/WeChat CIDR)" || exit 0
          git push
